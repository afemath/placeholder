<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming Soon</title>
  <style>
    :root {
      --coral: #d98b7f;
      --coral-dark: #b96f65;
      --grey: #f3f0ee;
      --text: #4a4645;
      --muted: #77706e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--grey), #ded8d5);
    }

    .card {
      width: min(90%, 720px);
      padding: 4rem 2rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(74, 70, 69, 0.12);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.45rem 0.8rem;
      color: white;
      background: var(--coral);
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: 1;
      color: var(--coral-dark);
    }

    p {
      max-width: 520px;
      margin: 0 auto 2rem;
      font-size: 1.15rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .divider {
      width: 72px;
      height: 4px;
      margin: 0 auto;
      background: var(--coral);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Coming Soon</h1>
    <p>This website is being updated. Please check back soon for more.</p>
    <div class="divider" aria-hidden="true"></div>
  </main>
</body>
</html>
